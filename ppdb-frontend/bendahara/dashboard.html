<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Bendahara - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">PPDB<span>Online</span></div>
    <div class="navbar-nav" id="navLinks">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="verifikasi-pembayaran.html">Verifikasi Bayar</a>
      <a href="tarif-biaya.html">Tarif Biaya</a>
      <a href="audit-log.html">Audit Log</a>
    </div>
    <div class="navbar-user">
      <div class="avatar" id="userAvatar"></div>
      <span id="userName" class="hide-mobile"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;" onclick="SessionManager.logout()">Keluar</button>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section"><div class="sidebar-section-title">Panel Keuangan</div></div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"><span class="icon">&#9632;</span> Dashboard</a>
        <a href="verifikasi-pembayaran.html" class="sidebar-link">
          <span class="icon">&#128179;</span> Verifikasi Bayar
          <span class="badge-count" id="pendingPayCount">0</span>
        </a>
        <a href="tarif-biaya.html" class="sidebar-link"><span class="icon">&#128197;</span> Tarif Biaya</a>
        <a href="audit-log.html" class="sidebar-link"><span class="icon">&#128202;</span> Audit Log</a>
      </div>
    </aside>

    <main class="layout-main">
      <div class="page-header">
        <h1>Dashboard Bendahara</h1>
        <p>Ringkasan keuangan dan status pembayaran PPDB.</p>
      </div>

      <div class="grid grid-4" style="margin-bottom:24px;" id="statCards"></div>

      <div class="grid grid-2">
        <div class="card">
          <div class="card-header">Pembayaran Terbaru</div>
          <div class="card-body" style="padding:0;">
            <table class="table">
              <thead><tr><th>Siswa</th><th>Status</th><th>Aksi</th></tr></thead>
              <tbody id="recentPayments"></tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Komponen Biaya</div>
          <div class="card-body" id="tariffSummary"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    if (!SessionManager.requireAuth('bendahara')) throw new Error('Unauthorized');

    const user = SessionManager.getUser();
    document.getElementById('userAvatar').textContent = user.name.charAt(0);
    document.getElementById('userName').textContent = user.name;

    const pendingPayments = MockDB.payments.filter(p => p.payment_status === 'pending').length;
    const lunasPayments = MockDB.payments.filter(p => p.payment_status === 'lunas').length;
    const totalRevenue = MockDB.payments.filter(p => p.payment_status === 'lunas').length * 250000;

    document.getElementById('pendingPayCount').textContent = pendingPayments;

    document.getElementById('statCards').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Pendaftar</div><div class="stat-value">${MockDB.students.length}</div></div>
      <div class="stat-card"><div class="stat-label">Pembayaran Pending</div><div class="stat-value" style="color:var(--warning);">${pendingPayments}</div></div>
      <div class="stat-card"><div class="stat-label">Sudah Lunas</div><div class="stat-value" style="color:var(--success);">${lunasPayments}</div></div>
      <div class="stat-card"><div class="stat-label">Total Pendapatan</div><div class="stat-value" style="font-size:1.25rem;">${formatCurrency(totalRevenue)}</div></div>
    `;

    const payBody = document.getElementById('recentPayments');
    MockDB.payments.forEach(p => {
      const s = MockDB.students.find(st => st.id === p.student_id);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${s ? s.name : '-'}</td>
        <td>${getStatusBadge(p.payment_status)}</td>
        <td><a href="verifikasi-pembayaran.html" class="btn btn-sm btn-outline">Detail</a></td>`;
      payBody.appendChild(tr);
    });

    const tariffEl = document.getElementById('tariffSummary');
    let totalTariff = 0;
    MockDB.tariffs.forEach(t => {
      totalTariff += t.amount;
      tariffEl.innerHTML += `
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
          <span>${t.component}</span>
          <strong>${formatCurrency(t.amount)}</strong>
        </div>`;
    });
    tariffEl.innerHTML += `
      <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:1.125rem;">
        <span>Total</span><span style="color:var(--primary);">${formatCurrency(totalTariff)}</span>
      </div>`;
  </script>
</body>
</html>
