<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pendaftar - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">PPDB<span>Online</span></div>
    <div class="navbar-nav" id="navLinks">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="biodata.html">Biodata</a>
      <a href="dokumen.html">Dokumen</a>
      <a href="pembayaran.html">Pembayaran</a>
      <a href="status.html">Status</a>
    </div>
    <div class="navbar-user">
      <div class="avatar" id="userAvatar"></div>
      <span id="userName" class="hide-mobile"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;" onclick="SessionManager.logout()">Keluar</button>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Menu Utama</div>
      </div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"><span class="icon">&#9632;</span> Dashboard</a>
        <a href="biodata.html" class="sidebar-link"><span class="icon">&#9998;</span> Biodata</a>
        <a href="dokumen.html" class="sidebar-link"><span class="icon">&#128194;</span> Dokumen</a>
        <a href="pembayaran.html" class="sidebar-link"><span class="icon">&#128179;</span> Pembayaran</a>
        <a href="status.html" class="sidebar-link"><span class="icon">&#10003;</span> Status Kelulusan</a>
      </div>
    </aside>

    <main class="layout-main">
      <div class="page-header">
        <h1>Dashboard Pendaftar</h1>
        <p>Selamat datang! Pantau status pendaftaran Anda di sini.</p>
      </div>

      <div class="grid grid-3" style="margin-bottom:24px;" id="statCards"></div>

      <div class="grid grid-2">
        <div class="card">
          <div class="card-header">Status Pendaftaran</div>
          <div class="card-body" id="registrationStatus"></div>
        </div>
        <div class="card">
          <div class="card-header">Pengumuman Terbaru</div>
          <div class="card-body" id="recentAnnouncements"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    if (!SessionManager.requireAuth('pendaftar')) throw new Error('Unauthorized');

    const user = SessionManager.getUser();
    document.getElementById('userAvatar').textContent = user.name.charAt(0);
    document.getElementById('userName').textContent = user.name;

    const student = MockDB.students.find(s => s.user_id === user.id) || MockDB.students[0];
    const docs = getStudentDocs(student.id);
    const payment = getStudentPayment(student.id);

    const approvedDocs = docs.filter(d => d.verification_status === 'disetujui').length;
    const totalDocs = docs.length;
    const paymentStatus = payment ? payment.payment_status : 'belum';

    document.getElementById('statCards').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Status Pendaftaran</div>
        <div class="stat-value" style="font-size:1.25rem;">${getStatusBadge(student.pendaftaran_status)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Berkas Terverifikasi</div>
        <div class="stat-value">${approvedDocs}/${totalDocs}</div>
        <div class="stat-change ${approvedDocs === totalDocs ? 'positive' : 'negative'}">${approvedDocs === totalDocs ? 'Semua berkas lengkap' : 'Belum lengkap'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pembayaran</div>
        <div class="stat-value" style="font-size:1.25rem;">${getStatusBadge(paymentStatus)}</div>
      </div>
    `;

    document.getElementById('registrationStatus').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Nama</span><strong>${student.name}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">NISN</span><strong>${student.nisn}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Asal Sekolah</span><strong>${student.asal_sekolah}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Status</span>${getStatusBadge(student.pendaftaran_status)}</div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Pembayaran</span>${getStatusBadge(paymentStatus)}</div>
      </div>
    `;

    const annList = document.getElementById('recentAnnouncements');
    MockDB.announcements.slice(0, 2).forEach(a => {
      annList.innerHTML += `
        <div style="padding:12px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <strong style="font-size:0.9375rem;">${a.title}</strong>
            <span style="font-size:0.75rem;color:var(--text-light);">${formatDate(a.date)}</span>
          </div>
          <p style="font-size:0.875rem;color:var(--text-muted);">${a.content}</p>
        </div>`;
    });
  </script>
</body>
</html>
