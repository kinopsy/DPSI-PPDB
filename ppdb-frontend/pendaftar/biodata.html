<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodata - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">PPDB<span>Online</span></div>
    <div class="navbar-nav" id="navLinks">
      <a href="dashboard.html">Dashboard</a>
      <a href="biodata.html" class="active">Biodata</a>
      <a href="dokumen.html">Dokumen</a>
      <a href="pembayaran.html">Pembayaran</a>
      <a href="status.html">Status</a>
    </div>
    <div class="navbar-user">
      <div class="avatar" id="userAvatar"></div>
      <span id="userName" class="hide-mobile"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;" onclick="SessionManager.logout()">Keluar</button>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section"><div class="sidebar-section-title">Menu Utama</div></div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">&#9632;</span> Dashboard</a>
        <a href="biodata.html" class="sidebar-link active"><span class="icon">&#9998;</span> Biodata</a>
        <a href="dokumen.html" class="sidebar-link"><span class="icon">&#128194;</span> Dokumen</a>
        <a href="pembayaran.html" class="sidebar-link"><span class="icon">&#128179;</span> Pembayaran</a>
        <a href="status.html" class="sidebar-link"><span class="icon">&#10003;</span> Status Kelulusan</a>
      </div>
    </aside>

    <main class="layout-main">
      <div class="page-header">
        <h1>Formulir Biodata</h1>
        <p>Lengkapi data diri Anda dengan benar. Data yang sudah dikirim tidak dapat diubah.</p>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="biodataForm">
            <h3 style="margin-bottom:16px;font-size:1rem;color:var(--primary);">Data Pribadi</h3>
            <div class="grid grid-2">
              <div class="form-group">
                <label for="nisn">NISN</label>
                <input type="text" id="nisn" class="form-control" placeholder="10 digit NISN" maxlength="10" required pattern="\d{10}">
              </div>
              <div class="form-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" class="form-control" placeholder="Sesuai KK" required>
              </div>
              <div class="form-group">
                <label for="nik">NIK</label>
                <input type="text" id="nik" class="form-control" placeholder="16 digit NIK" maxlength="16" required pattern="\d{16}">
              </div>
              <div class="form-group">
                <label for="tempat_lahir">Tempat Lahir</label>
                <input type="text" id="tempat_lahir" class="form-control" placeholder="Kota kelahiran" required>
              </div>
              <div class="form-group">
                <label for="tanggal_lahir">Tanggal Lahir</label>
                <input type="date" id="tanggal_lahir" class="form-control" required>
              </div>
              <div class="form-group">
                <label for="jenis_kelamin">Jenis Kelamin</label>
                <select id="jenis_kelamin" class="form-control" required>
                  <option value="">Pilih</option>
                  <option value="Laki-laki">Laki-laki</option>
                  <option value="Perempuan">Perempuan</option>
                </select>
              </div>
              <div class="form-group">
                <label for="agama">Agama</label>
                <select id="agama" class="form-control" required>
                  <option value="">Pilih</option>
                  <option value="Islam">Islam</option>
                  <option value="Kristen">Kristen</option>
                  <option value="Katolik">Katolik</option>
                  <option value="Hindu">Hindu</option>
                  <option value="Buddha">Buddha</option>
                  <option value="Konghucu">Konghucu</option>
                </select>
              </div>
              <div class="form-group">
                <label for="telepon">No. Telepon</label>
                <input type="tel" id="telepon" class="form-control" placeholder="08xxx" required>
              </div>
            </div>

            <div class="form-group">
              <label for="alamat">Alamat Lengkap</label>
              <textarea id="alamat" class="form-control" rows="3" placeholder="Jalan, No. RT/RW, Kelurahan, Kecamatan" required></textarea>
            </div>

            <h3 style="margin:24px 0 16px;font-size:1rem;color:var(--primary);">Data Asal Sekolah</h3>
            <div class="grid grid-2">
              <div class="form-group">
                <label for="asal_sekolah">Asal Sekolah</label>
                <input type="text" id="asal_sekolah" class="form-control" placeholder="Nama SMP Asal" required>
              </div>
              <div class="form-group">
                <label for="program">Program Pilihan</label>
                <select id="program" class="form-control" required>
                  <option value="">Pilih Program</option>
                  <option value="IPA">IPA</option>
                  <option value="IPS">IPS</option>
                  <option value="Bahasa">Bahasa</option>
                </select>
              </div>
            </div>

            <div style="display:flex;gap:12px;margin-top:24px;">
              <button type="submit" class="btn btn-primary btn-lg">Simpan Biodata</button>
              <a href="dashboard.html" class="btn btn-outline btn-lg">Batal</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    if (!SessionManager.requireAuth('pendaftar')) throw new Error('Unauthorized');

    const user = SessionManager.getUser();
    document.getElementById('userAvatar').textContent = user.name.charAt(0);
    document.getElementById('userName').textContent = user.name;

    const student = MockDB.students.find(s => s.user_id === user.id) || MockDB.students[0];
    if (student) {
      document.getElementById('nisn').value = student.nisn || '';
      document.getElementById('name').value = student.name || '';
      document.getElementById('nik').value = student.nik || '';
      document.getElementById('tempat_lahir').value = student.tempat_lahir || '';
      document.getElementById('tanggal_lahir').value = student.tanggal_lahir || '';
      document.getElementById('jenis_kelamin').value = student.jenis_kelamin || '';
      document.getElementById('agama').value = student.agama || '';
      document.getElementById('telepon').value = student.telepon || '';
      document.getElementById('alamat').value = student.alamat || '';
      document.getElementById('asal_sekolah').value = student.asal_sekolah || '';
    }

    document.getElementById('biodataForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const nisn = document.getElementById('nisn').value;
      const nik = document.getElementById('nik').value;

      if (!/^\d{10}$/.test(nisn)) {
        showToast('NISN harus 10 digit angka.', 'error');
        return;
      }
      if (!/^\d{16}$/.test(nik)) {
        showToast('NIK harus 16 digit angka.', 'error');
        return;
      }

      showToast('Biodata berhasil disimpan!');
      setTimeout(() => { window.location.href = 'dokumen.html'; }, 1500);
    });
  </script>
</body>
</html>
