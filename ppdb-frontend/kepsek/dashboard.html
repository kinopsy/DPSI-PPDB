<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kepala Sekolah - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">PPDB<span>Online</span></div>
    <div class="navbar-nav" id="navLinks">
      <a href="dashboard.html" class="active">Ringkasan Eksekutif</a>
    </div>
    <div class="navbar-user">
      <div class="avatar" id="userAvatar"></div>
      <span id="userName" class="hide-mobile"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;" onclick="SessionManager.logout()">Keluar</button>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <main style="max-width:1200px;margin:0 auto;padding:88px 24px 24px;">
    <div class="page-header">
      <h1>Ringkasan Eksekutif PPDB</h1>
      <p>Dashboard real-timeread-only. Data diperbarui secara otomatis.</p>
    </div>

    <div class="grid grid-4" style="margin-bottom:24px;" id="execStats"></div>

    <div class="grid grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-header">Status Pendaftar</div>
        <div class="card-body" id="statusBreakdown"></div>
      </div>
      <div class="card">
        <div class="card-header">Status Pembayaran</div>
        <div class="card-body" id="paymentBreakdown"></div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-header">Kuota per Program</div>
        <div class="card-body" id="quotaBreakdown"></div>
      </div>
      <div class="card">
        <div class="card-header">Pendapatan</div>
        <div class="card-body" id="revenueBreakdown"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Pengumuman Terakhir</div>
      <div class="card-body" id="lastAnnouncement"></div>
    </div>

    <p style="text-align:center;margin-top:32px;font-size:0.8125rem;color:var(--text-light);">Data terakhir diperbarui: <span id="lastUpdate"></span></p>
  </main>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    if (!SessionManager.requireAuth('kepsek')) throw new Error('Unauthorized');

    const user = SessionManager.getUser();
    document.getElementById('userAvatar').textContent = user.name.charAt(0);
    document.getElementById('userName').textContent = user.name;

    const totalStudents = MockDB.students.length;
    const totalDocs = MockDB.documents.length;
    const approvedDocs = MockDB.documents.filter(d => d.verification_status === 'disetujui').length;
    const lunasPayments = MockDB.payments.filter(p => p.payment_status === 'lunas').length;
    const totalRevenue = lunasPayments * 250000;
    const lulus = MockDB.students.filter(s => s.pendaftaran_status === 'lulus').length;

    document.getElementById('execStats').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Pendaftar</div>
        <div class="stat-value">${totalStudents}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Berkas Disetujui</div>
        <div class="stat-value" style="color:var(--success);">${approvedDocs}/${totalDocs}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Siswa Lulus</div>
        <div class="stat-value" style="color:var(--secondary);">${lulus}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Pendapatan</div>
        <div class="stat-value" style="font-size:1.25rem;color:var(--primary);">${formatCurrency(totalRevenue)}</div>
      </div>
    `;

    const statusCounts = {
      lulus: MockDB.students.filter(s => s.pendaftaran_status === 'lulus').length,
      terverifikasi: MockDB.students.filter(s => s.pendaftaran_status === 'terverifikasi').length,
      menunggu_verifikasi: MockDB.students.filter(s => s.pendaftaran_status === 'menunggu_verifikasi').length,
      belum_lengkap: MockDB.students.filter(s => s.pendaftaran_status === 'belum_lengkap').length,
    };

    document.getElementById('statusBreakdown').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--success);"></span> Lulus</span>
          <strong>${statusCounts.lulus}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--primary);"></span> Terverifikasi</span>
          <strong>${statusCounts.terverifikasi}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--warning);"></span> Menunggu Verifikasi</span>
          <strong>${statusCounts.menunggu_verifikasi}</strong>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--error);"></span> Belum Lengkap</span>
          <strong>${statusCounts.belum_lengkap}</strong>
        </div>
      </div>`;

    const payCounts = {
      lunas: MockDB.payments.filter(p => p.payment_status === 'lunas').length,
      pending: MockDB.payments.filter(p => p.payment_status === 'pending').length,
    };

    document.getElementById('paymentBreakdown').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--success);"></span> Lunas</span>
          <strong>${payCounts.lunas} siswa</strong>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--warning);"></span> Pending</span>
          <strong>${payCounts.pending} siswa</strong>
        </div>
        <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;">
          <span>Total Diterima</span><strong style="color:var(--success);">${formatCurrency(payCounts.lunas * 250000)}</strong>
        </div>
      </div>`;

    document.getElementById('quotaBreakdown').innerHTML = MockDB.quotas.map(q => {
      const pct = Math.round((q.current_count / q.max_quota) * 100);
      const color = pct > 90 ? 'var(--error)' : pct > 70 ? 'var(--warning)' : 'var(--secondary)';
      return `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <strong style="font-size:0.9375rem;">${q.program}</strong>
            <span style="font-size:0.875rem;color:var(--text-muted);">${q.current_count}/${q.max_quota}</span>
          </div>
          <div style="background:var(--bg-gray);height:8px;border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;"></div>
          </div>
        </div>`;
    }).join('');

    const totalTariff = MockDB.tariffs.reduce((sum, t) => sum + t.amount, 0);
    document.getElementById('revenueBreakdown').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Siswa Lunas</span><strong>${payCounts.lunas}</strong></div>
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Total Tarif Pendaftaran</span><strong>${formatCurrency(totalTariff)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);font-size:1.125rem;">
          <strong>Pendapatan Diterima</strong>
          <strong style="color:var(--primary);">${formatCurrency(totalRevenue)}</strong>
        </div>
      </div>`;

    const lastAnn = MockDB.announcements[0];
    document.getElementById('lastAnnouncement').innerHTML = lastAnn ? `
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <strong>${lastAnn.title}</strong>
          <span style="font-size:0.8125rem;color:var(--text-light);">${formatDate(lastAnn.date)}</span>
        </div>
        <p style="color:var(--text-muted);">${lastAnn.content}</p>
      </div>` : '<p style="color:var(--text-muted);">Belum ada pengumuman.</p>';

    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('id-ID');
  </script>
</body>
</html>
