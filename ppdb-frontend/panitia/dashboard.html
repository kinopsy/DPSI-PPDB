<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Panitia - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">PPDB<span>Online</span></div>
    <div class="navbar-nav" id="navLinks">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="verifikasi-berkas.html">Verifikasi</a>
      <a href="kuota-dinamis.html">Kuota</a>
      <a href="kelulusan.html">Kelulusan</a>
      <a href="pengumuman.html">Pengumuman</a>
    </div>
    <div class="navbar-user">
      <div class="avatar" id="userAvatar"></div>
      <span id="userName" class="hide-mobile"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:none;" onclick="SessionManager.logout()">Keluar</button>
    </div>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section"><div class="sidebar-section-title">Panel Panitia</div></div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active"><span class="icon">&#9632;</span> Dashboard</a>
        <a href="verifikasi-berkas.html" class="sidebar-link">
          <span class="icon">&#128196;</span> Verifikasi Berkas
          <span class="badge-count" id="pendingDocsCount">0</span>
        </a>
        <a href="kuota-dinamis.html" class="sidebar-link"><span class="icon">&#127919;</span> Kuota Dinamis</a>
        <a href="kelulusan.html" class="sidebar-link"><span class="icon">&#10003;</span> Konsol Kelulusan</a>
        <a href="pengumuman.html" class="sidebar-link"><span class="icon">&#128227;</span> Pengumuman</a>
      </div>
    </aside>

    <main class="layout-main">
      <div class="page-header">
        <h1>Dashboard Panitia</h1>
        <p>Ringkasan aktivitas pendaftaran dan verifikasi PPDB.</p>
      </div>

      <div class="grid grid-4" style="margin-bottom:24px;" id="statCards"></div>

      <div class="grid grid-2">
        <div class="card">
          <div class="card-header">Pendaftar Terbaru</div>
          <div class="card-body" style="padding:0;">
            <table class="table" id="recentApplicants">
              <thead><tr><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Kuota per Program</div>
          <div class="card-body" id="quotaOverview"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    if (!SessionManager.requireAuth('panitia')) throw new Error('Unauthorized');

    const user = SessionManager.getUser();
    document.getElementById('userAvatar').textContent = user.name.charAt(0);
    document.getElementById('userName').textContent = user.name;

    const totalStudents = MockDB.students.length;
    const pendingDocs = MockDB.documents.filter(d => d.verification_status === 'menunggu').length;
    const pendingPayments = MockDB.payments.filter(p => p.payment_status === 'pending').length;
    const graduated = MockDB.students.filter(s => s.pendaftaran_status === 'lulus').length;

    document.getElementById('pendingDocsCount').textContent = pendingDocs;

    document.getElementById('statCards').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Pendaftar</div><div class="stat-value">${totalStudents}</div></div>
      <div class="stat-card"><div class="stat-label">Menunggu Verifikasi</div><div class="stat-value" style="color:var(--warning);">${pendingDocs}</div></div>
      <div class="stat-card"><div class="stat-label">Pembayaran Pending</div><div class="stat-value" style="color:var(--error);">${pendingPayments}</div></div>
      <div class="stat-card"><div class="stat-label">Siswa Lulus</div><div class="stat-value" style="color:var(--success);">${graduated}</div></div>
    `;

    const tbody = document.querySelector('#recentApplicants tbody');
    MockDB.students.forEach(s => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${s.name}</td><td>${getStatusBadge(s.pendaftaran_status)}</td><td><a href="verifikasi-berkas.html" class="btn btn-sm btn-outline">Detail</a></td>`;
      tbody.appendChild(tr);
    });

    const quotaEl = document.getElementById('quotaOverview');
    MockDB.quotas.forEach(q => {
      const pct = Math.round((q.current_count / q.max_quota) * 100);
      quotaEl.innerHTML += `
        <div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <strong style="font-size:0.9375rem;">${q.program}</strong>
            <span style="font-size:0.875rem;color:var(--text-muted);">${q.current_count}/${q.max_quota}</span>
          </div>
          <div style="background:var(--bg-gray);height:8px;border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${pct > 90 ? 'var(--error)' : pct > 70 ? 'var(--warning)' : 'var(--secondary)'};border-radius:4px;transition:width 0.3s;"></div>
          </div>
          <p style="font-size:0.75rem;color:var(--text-light);margin-top:4px;">Batas: ${formatDate(q.deadline)} | ${pct}% terisi</p>
        </div>`;
    });
  </script>
</body>
</html>
