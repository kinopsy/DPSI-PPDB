<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-panel auth-panel-left">
      <div style="text-align:center;max-width:400px;">
        <img src="../logo.png" alt="Logo Sekolah" style="width:120px;height:auto;margin-bottom:20px;border-radius:16px;background:rgba(255,255,255,0.2);padding:8px;object-fit:contain;box-shadow:0 8px 32px rgba(0,0,0,0.2);" />
        <h1 style="font-size:2rem;margin-bottom:12px;">PPDB Online</h1>
        <p style="opacity:0.9;font-size:1.125rem;">Daftarkan diri Anda untuk menjadi bagian dari sekolah terbaik.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-form-wrapper">
        <div class="auth-card">
          <h2>Daftar Akun Baru</h2>
          <p style="color:var(--text-muted);margin-bottom:24px;font-size:0.9375rem;">Isi data berikut untuk membuat akun pendaftar</p>

          <div id="registerError" class="alert alert-error" style="display:none;"></div>

          <form id="registerForm">
            <div class="form-group">
              <label for="name">Nama Lengkap</label>
              <input type="text" id="name" class="form-control" placeholder="Nama sesuai KK" required minlength="3">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="Aktif dan valid" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Konfirmasi Password</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password" required>
            </div>
            <div class="form-group" style="display:flex;gap:8px;align-items:flex-start;">
              <input type="checkbox" id="agree" required style="margin-top:4px;">
              <label for="agree" style="font-weight:400;font-size:0.875rem;color:var(--text-muted);">Saya menyetujui syarat dan ketentuan yang berlaku</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">Daftar Sekarang</button>
          </form>

          <p style="text-align:center;margin-top:20px;font-size:0.9375rem;color:var(--text-muted);">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('registerError');

      if (password !== confirmPassword) {
        errorEl.textContent = 'Password tidak cocok.';
        errorEl.style.display = 'block';
        return;
      }

      if (MockDB.users.find(u => u.email === email)) {
        errorEl.textContent = 'Email sudah terdaftar.';
        errorEl.style.display = 'block';
        return;
      }

      const newUser = {
        id: 'u' + String(MockDB.users.length + 1).padStart(3, '0'),
        name, email, password, role: 'pendaftar'
      };
      MockDB.users.push(newUser);

      showToast('Registrasi berhasil! Silakan masuk.');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    });

    if (SessionManager.getUser()) {
      window.location.href = '../pendaftar/dashboard.html';
    }
  </script>
</body>
</html>
