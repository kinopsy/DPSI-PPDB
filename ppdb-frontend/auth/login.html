<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - PPDB Online</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-panel auth-panel-left">
      <div style="text-align:center;max-width:400px;">
        <img src="../logo.png" alt="Logo Sekolah" style="width:120px;height:auto;margin-bottom:20px;border-radius:16px;background:rgba(255,255,255,0.2);padding:8px;object-fit:contain;box-shadow:0 8px 32px rgba(0,0,0,0.2);" />
        <h1 style="font-size:2rem;margin-bottom:12px;">PPDB Online</h1>
        <p style="opacity:0.9;font-size:1.125rem;">Sistem Penerimaan Peserta Didik Baru yang transparan dan mudah.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-form-wrapper">
        <div class="auth-card">
          <h2>Masuk</h2>
          <p class="subtitle" style="color:var(--text-muted);margin-bottom:24px;">Silakan masuk ke akun Anda</p>

          <div id="loginError" class="alert alert-error" style="display:none;"></div>

          <form id="loginForm">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="Masukkan email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">Masuk</button>
          </form>

          <p style="text-align:center;margin-top:20px;font-size:0.9375rem;color:var(--text-muted);">
            Belum punya akun? <a href="register.html">Daftar di sini</a>
          </p>

          <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
            <p style="font-size:0.8125rem;color:var(--text-light);text-align:center;margin-bottom:12px;">Akun Demo</p>
            <div style="display:grid;gap:8px;">
              <button type="button" class="btn btn-outline btn-sm btn-block" onclick="fillDemo('ahmad@demo.com','123456')">Pendaftar: ahmad@demo.com</button>
              <button type="button" class="btn btn-outline btn-sm btn-block" onclick="fillDemo('panitia@demo.com','123456')">Panitia: panitia@demo.com</button>
              <button type="button" class="btn btn-outline btn-sm btn-block" onclick="fillDemo('bendahara@demo.com','123456')">Bendahara: bendahara@demo.com</button>
              <button type="button" class="btn btn-outline btn-sm btn-block" onclick="fillDemo('kepsek@demo.com','123456')">Kepsek: kepsek@demo.com</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/mock-data.js"></script>
  <script>
    function fillDemo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const result = SessionManager.login(email, password);

      if (result.success) {
        const redirects = { pendaftar: '../pendaftar/dashboard.html', panitia: '../panitia/dashboard.html', bendahara: '../bendahara/dashboard.html', kepsek: '../kepsek/dashboard.html' };
        window.location.href = redirects[result.user.role] || '../index.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.style.display = 'block';
      }
    });

    if (SessionManager.getUser()) {
      const user = SessionManager.getUser();
      const redirects = { pendaftar: '../pendaftar/dashboard.html', panitia: '../panitia/dashboard.html', bendahara: '../bendahara/dashboard.html', kepsek: '../kepsek/dashboard.html' };
      window.location.href = redirects[user.role] || '../index.html';
    }
  </script>
</body>
</html>
